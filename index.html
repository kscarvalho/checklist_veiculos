<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style/style.css">
  <title>Checklist</title>
</head>

<body>
  <div class="container-geral">
    <h3>TERMO DE RESPON E DOC</h3>
    <div class="termo">
      <p>O condutor está ciente de que não deve iniciar a
        rota caso haja qualquer impeditivo que comprometa sua segurança?
      </p>
      <label for="termo-sim">
        <input id="termo-sim" type="radio" name="termo" value="sim" title="Aceito os termos">
        Sim
      </label>
      <label for="termo-nao">
        <input id="termo-nao" type="radio" name="termo" value="não" title="Aceito os termos">
        Não
      </label>
    </div>

    <h3>CRLV *</h3>
    <div class="container-crlv">
      <p>
        Anexar foto do CRLV atualizado?
      </p>
      <label for="crlvsim">
        <input id="crlvsim" type="radio" name="crlv" value="sim" title="CRLV atualizado">
        Sim
      </label>
      <label for="crlvnao">
        <input id="crlvnao" type="radio" name="crlv" value="não" title="CRLV atualizado">
        Não
      </label>


      <label for="adicionarImgCrlv" id="areaimagemcrlv" class="botao">
        <p><span>Adicionar img:</span></p>
        <img id="previewCrlv" alt="" title="Pré-visualização da imagem" />
        <input type="file" id="adicionarImgCrlv" accept="image/*" capture="user" hidden />
      </label>

      <label for="comentariocrlv" id="comentariocrlv">
        <p><span>Qual impedimento?</span></p>
        <textarea class="comentariocrlv" placeholder="Digite algo"></textarea>
      </label>
    </div>

    <h3>CARTÃO DE ABASTECIMENTO *</h3>
    <div class="container-cartao-abasteimento">
      <p>
        Anexar foto e digitar número do cartão de abastecimento
      </p>
      <label for="cartaosim">
        <input id="cartaosim" type="radio" name="cartao" value="sim" title="Carão Abastecimento">
        Sim
      </label>
      <label for="cartaonao">
        <input id="cartaonao" type="radio" name="cartao" value="não" title="Cartão Abastecimento">
        Pagamento digital
      </label>


      <label for="adicionarImgCartao" id="areaimagemcartao" class="botao">
        <p><span>Adicionar img:</span></p>
        <img id="previewCartao" alt="" title="Pré-visualização da imagem" />
        <input type="file" id="adicionarImgCartao" accept="image/*" capture="user" hidden>
      </label>

      <label for="comentariocartao" id="comentariocartao">
        <textarea class="comentariocartao" placeholder="Digite algo"></textarea>
      </label>
    </div>
  </div>
  <script src="./scripts/script.js"></script>
</body>

</html>
